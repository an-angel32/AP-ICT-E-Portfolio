<!DOCTYPE html>
<html>

<head>
<title>Script in Head Sampleee</title>
<script>
function showMessage() {document.getElementById("demo").innerHTML = "from a script in the HEAD!"}
</script>
</head>

<body>
<h2>JavaScript in Head</h2>
<p id="demo">Click the button to see the message.</p>
<button onclick="showMessage()">Click Me</button>
</body>
</html>
